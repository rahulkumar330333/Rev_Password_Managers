<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Security Audit')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h3 class="fw-bold mb-4"><i class="bi bi-shield-check me-2 text-primary"></i>Security Audit</h3>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div class="alert alert-info border-0">
                        <i class="bi bi-info-circle me-2"></i>
                        A full security audit will analyze all your stored passwords for weaknesses and reuse.
                    </div>
                    <form th:action="@{/security/audit}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Master Password</label>
                            <input type="password" name="masterPassword" class="form-control" required placeholder="Enter master password to proceed"/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-semibold">
                                <i class="bi bi-search me-2"></i>Run Security Audit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
