<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Password Generator')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4 flex-grow-1">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <h3 class="fw-bold mb-4"><i class="bi bi-shuffle text-primary me-2"></i>Password Generator</h3>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-semibold mb-4">Generator Settings</h5>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Password Length: <span id="lengthVal"
                                                                                   class="text-primary fw-bold">16</span></label>
                        <input type="range" class="form-range" id="lengthSlider" min="8" max="64" value="16"
                               oninput="document.getElementById('lengthVal').textContent=this.value" />
                    </div>
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="uppercase" checked />
                                <label class="form-check-label" for="uppercase">Uppercase (A-Z)</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="lowercase" checked />
                                <label class="form-check-label" for="lowercase">Lowercase (a-z)</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="digits" checked />
                                <label class="form-check-label" for="digits">Numbers (0-9)</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="special" checked />
                                <label class="form-check-label" for="special">Special (!@#$...)</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="excludeSimilar" />
                                <label class="form-check-label" for="excludeSimilar">Exclude similar characters
                                    (0,O,l,1,I)</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 fw-semibold mb-3" onclick="generatePassword()">
                        <i class="bi bi-shuffle me-2"></i>Generate Password
                    </button>
                    <button class="btn btn-outline-secondary w-100" onclick="generateMultiple()">
                        <i class="bi bi-layers me-2"></i>Generate 5 Options
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <h5 class="fw-semibold mb-3">Generated Password</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="generatedPwd"
                               class="form-control form-control-lg fw-bold font-monospace"
                               placeholder="Click Generate..." readonly />
                        <button class="btn btn-outline-secondary" onclick="copyGenerated()" title="Copy">
                            <i class="bi bi-clipboard"></i>
                        </button>
                        <button class="btn btn-outline-primary" onclick="generatePassword()" title="Refresh">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                    <div id="strengthSection" style="display:none">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-medium small">Strength:</span>
                            <span id="strengthLabel" class="fw-bold small"></span>
                        </div>
                        <div class="progress mb-3" style="height:8px">
                            <div id="strengthBar" class="progress-bar" role="progressbar"
                                 style="width:0%;transition:width 0.5s"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="multipleSection" style="display:none" class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <h6 class="fw-semibold mb-3">Choose One:</h6>
                    <div id="multipleList" class="d-flex flex-column gap-2"></div>
                </div>
            </div>

            <!-- Save to Vault -->
            <div id="saveSection" style="display:none" class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h6 class="fw-semibold mb-3"><i class="bi bi-save me-2"></i>Save to Vault</h6>
                    <form th:action="@{/generator/save}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="password" id="savePassword" />
                        <div class="row g-2 mb-2">
                            <div class="col-md-6">
                                <input type="text" name="accountName" class="form-control"
                                       placeholder="Account Name *" required />
                            </div>
                            <div class="col-md-6">
                                <input type="url" name="websiteUrl" class="form-control"
                                       placeholder="Website URL" />
                            </div>
                            <div class="col-md-6">
                                <input type="text" name="username" class="form-control"
                                       placeholder="Username/Email" />
                            </div>
                            <div class="col-md-6">
                                <input type="password" name="masterPassword" class="form-control"
                                       placeholder="Master Password *" required />
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-semibold">
                            <i class="bi bi-save me-2"></i>Save to Vault
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="copyToast" class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
    <div class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-check-circle me-2"></i>Copied!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ '';

    async function generatePassword() {
        const data = getSettings();
        const resp = await fetch('/generator/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify(data)
        });
        const result = await resp.json();
        document.getElementById('generatedPwd').value = result.password;
        document.getElementById('savePassword').value = result.password;
        updateStrength(result);
        document.getElementById('strengthSection').style.display = 'block';
        document.getElementById('saveSection').style.display = 'block';
        document.getElementById('multipleSection').style.display = 'none';
    }

    async function generateMultiple() {
        const data = getSettings();
        const results = [];
        for (let i = 0; i < 5; i++) {
            const resp = await fetch('/generator/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(data)
            });
            results.push(await resp.json());
        }
        const list = document.getElementById('multipleList');
        list.innerHTML = '';
        results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'd-flex align-items-center gap-2';
            div.innerHTML = `
        <span class="font-monospace flex-grow-1 bg-light rounded p-2 small">${r.password}</span>
        <span class="badge bg-${r.cssClass}">${r.label}</span>
        <button class="btn btn-sm btn-outline-primary" onclick="selectPassword('${r.password}')">
            <i class="bi bi-check"></i> Use
        </button>`;
            list.appendChild(div);
        });
        document.getElementById('multipleSection').style.display = 'block';
    }

    function selectPassword(pwd) {
        document.getElementById('generatedPwd').value = pwd;
        document.getElementById('savePassword').value = pwd;
        document.getElementById('saveSection').style.display = 'block';
        document.getElementById('multipleSection').style.display = 'none';
    }

    function getSettings() {
        return {
            length: parseInt(document.getElementById('lengthSlider').value),
            uppercase: document.getElementById('uppercase').checked,
            lowercase: document.getElementById('lowercase').checked,
            digits: document.getElementById('digits').checked,
            special: document.getElementById('special').checked,
            excludeSimilar: document.getElementById('excludeSimilar').checked
        };
    }

    function updateStrength(result) {
        const bar = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        bar.style.width = result.percent + '%';
        bar.className = 'progress-bar bg-' + result.cssClass;
        label.textContent = result.label;
        label.className = 'fw-bold small text-' + result.cssClass;
    }

    function copyGenerated() {
        const val = document.getElementById('generatedPwd').value;
        if (!val) return;
        navigator.clipboard.writeText(val).then(() => {
            new bootstrap.Toast(document.querySelector('#copyToast .toast')).show();
        });
    }
</script>
</body>

</html>
