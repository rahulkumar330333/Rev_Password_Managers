<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Security Questions')}"></head>
<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">A
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h4 class="fw-semibold mb-3"><i class="bi bi-shield-lock me-2 text-primary"></i>Answer Security Questions</h4>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/auth/forgot-password/verify}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="userId" th:value="${userId}"/>
                        <div th:each="q, i : ${questions}" class="mb-3">
                            <input type="hidden" th:name="'q' + ${i.count} + 'Id'" th:value="${q.id}"/>
                            <label class="form-label fw-medium" th:text="${q.question}"></label>
                            <input type="text" th:name="'answer' + ${i.count}" class="form-control" required placeholder="Your answer"/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-semibold">Verify Answers</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
