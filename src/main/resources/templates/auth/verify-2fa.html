<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head th:replace="~{fragments/layout :: head('Verify 2FA')}"></head>

<body class="glass-bg m-0 p-0" style="overflow-x: hidden;">
    <!-- Premium Mesh Gradient / Noise (Global Fixed) -->
    <div class="mesh-gradient"></div>
    <div class="noise-overlay"></div>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="row justify-content-center w-100">
            <div class="col-md-7 col-lg-6 col-xl-5 animate__animated animate__fadeIn">
                <!-- Security Badge -->
                <div class="text-center mb-5">
                    <div class="hero-badge mb-4 animate__animated animate__fadeInDown d-inline-block">
                        <i class="bi bi-shield-lock-fill me-2"></i>SECUREVAULT PREMIUM
                    </div>
                    <h3 class="text-white fw-bold mb-2 uppercase-labels" style="letter-spacing: 2px;">TWO-FACTOR
                        VERIFICATION</h3>
                    <p class="text-white-50 small mx-auto" style="max-width: 300px;">Please enter the 6-digit code from
                        your authenticator app to continue.</p>
                    <div class="mx-auto bg-white mt-3 pb-1 opacity-10" style="width: 40px;"></div>
                </div>

                <div class="elite-login-card p-4 p-md-5 animate__animated animate__zoomIn">
                    <div th:if="${error}"
                        class="alert alert-danger bg-danger bg-opacity-10 border border-danger border-opacity-25 text-danger shadow-sm mb-4 animate__animated animate__shakeX">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/auth/verify-2fa}" method="post" class="mx-auto" style="max-width: 320px;">
                        <div class="mb-5">
                            <input type="text" name="code"
                                class="form-control form-control-lg text-center fw-bold glass-input-elite"
                                placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus
                                style="font-size: 2.5rem; letter-spacing: 0.3em; height: 80px;">
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-maroon-elite py-3 fw-bold">
                                VERIFY AND LOGIN <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <div class="mt-4 pt-3 border-top border-white border-opacity-10 text-center">
                        <a th:href="@{/auth/login}" class="text-decoration-none small text-white-50 hover-white">
                            <i class="bi bi-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <p class="small text-white-50 opacity-50">&copy; 2026 SecureVault. Engineered for Privacy.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .hover-white:hover {
            color: white !important;
        }
    </style>
</body>

</html>
