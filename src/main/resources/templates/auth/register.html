<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Register')}"></head>

<body class="bg-dark py-4">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem"></i>
                <h2 class="text-white fw-bold mt-2">Create Your Vault</h2>
            </div>
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/auth/register}" method="post" th:object="${registerDto}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <h5 class="fw-semibold mb-3 border-bottom pb-2"><i
                                class="bi bi-person me-2 text-primary"></i>Account Details</h5>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">First Name</label>
                                <input type="text" th:field="*{firstName}" class="form-control"
                                       placeholder="John" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Doe" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Username <span
                                        class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" class="form-control" required
                                       placeholder="johndoe" />
                                <div th:if="${#fields.hasErrors('username')}" class="text-danger small"
                                     th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}" class="form-control" required
                                       placeholder="john@example.com" />
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-medium">Phone Number</label>
                                <input type="tel" th:field="*{phoneNumber}" class="form-control"
                                       placeholder="+1234567890" />
                            </div>
                        </div>

                        <h5 class="fw-semibold mb-3 border-bottom pb-2"><i
                                class="bi bi-lock me-2 text-primary"></i>Master Password</h5>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Master Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" th:field="*{masterPassword}" id="masterPwd"
                                           class="form-control" required oninput="checkStrength(this.value)"
                                           placeholder="Min 8 characters" />
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePwd('masterPwd',this)"><i class="bi bi-eye"></i></button>
                                </div>
                                <div class="mt-1">
                                    <div class="progress" style="height:6px">
                                        <div id="strengthBar" class="progress-bar" role="progressbar"
                                             style="width:0%"></div>
                                    </div>
                                    <small id="strengthLabel" class="text-muted"></small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Confirm Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" th:field="*{confirmPassword}" id="confirmPwd"
                                           class="form-control" required placeholder="Repeat password" />
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePwd('confirmPwd',this)"><i class="bi bi-eye"></i></button>
                                </div>
                            </div>
                        </div>

                        <h5 class="fw-semibold mb-3 border-bottom pb-2"><i
                                class="bi bi-question-circle me-2 text-primary"></i>Security Questions <span
                                class="text-danger">*</span></h5>
                        <p class="text-muted small mb-3">These are used for account recovery. Choose wisely.</p>
                        <div th:each="i : ${#numbers.sequence(1,3)}" class="mb-3">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium" th:text="'Question ' + ${i}"></label>
                                    <select th:name="'question' + ${i}" class="form-select" required>
                                        <option value="">-- Select a question --</option>
                                        <option>What was the name of your first pet?</option>
                                        <option>What city were you born in?</option>
                                        <option>What is your mother's maiden name?</option>
                                        <option>What was the name of your first school?</option>
                                        <option>What was the make of your first car?</option>
                                        <option>What is the name of your childhood best friend?</option>
                                        <option>What street did you grow up on?</option>
                                        <option>What is your oldest sibling's middle name?</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium" th:text="'Answer ' + ${i}"></label>
                                    <input type="text" th:name="'answer' + ${i}" class="form-control" required
                                           placeholder="Your answer" />
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                <i class="bi bi-person-plus me-2"></i>Create Account
                            </button>
                        </div>
                        <div class="text-center mt-3">
                            <span class="text-muted">Already have an account?</span>
                            <a th:href="@{/auth/login}"
                               class="text-primary text-decoration-none fw-semibold ms-1">Sign In</a>
                        </div>
                        <div class="text-center mt-2">
                            <a th:href="@{/}" class="text-muted text-decoration-none small">
                                <i class="bi bi-house-door me-1"></i>Back to Home
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
    function checkStrength(pwd) {
        let score = 0;
        if (pwd.length >= 8) score++;
        if (pwd.length >= 12) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[a-z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        const bar = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        const pct = (score / 6) * 100;
        bar.style.width = pct + '%';
        if (score <= 2) { bar.className = 'progress-bar bg-danger'; label.textContent = 'Weak'; label.className = 'text-danger small'; }
        else if (score <= 4) { bar.className = 'progress-bar bg-warning'; label.textContent = 'Medium'; label.className = 'text-warning small'; }
        else if (score <= 5) { bar.className = 'progress-bar bg-success'; label.textContent = 'Strong'; label.className = 'text-success small'; }
        else { bar.className = 'progress-bar bg-primary'; label.textContent = 'Very Strong'; label.className = 'text-primary small'; }
    }
</script>
</body>

</html>
