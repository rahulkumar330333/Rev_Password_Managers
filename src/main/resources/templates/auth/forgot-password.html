<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-key-fill text-warning" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold">Reset Password</h2>
            </div>
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
                    <p class="text-muted mb-4">Enter your registered email to begin password recovery.</p>
                    <form th:action="@{/auth/forgot-password/find}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" required placeholder="your@email.com"/>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-semibold">
                                <i class="bi bi-search me-2"></i>Find My Account
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a th:href="@{/auth/login}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
