<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('View Password')}"></head>

<body class="d-flex flex-column min-vh-100 glass-bg">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/vault}" class="btn btn-outline-secondary btn-sm me-3"><i
                        class="bi bi-arrow-left"></i></a>
                <h3 class="fw-bold mb-0"><i class="bi bi-eye me-2 text-primary"></i>View Entry</h3>
            </div>

            <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>

            <!-- Reveal Password Form -->
            <div th:if="${requiresAuth and (revealed == null or !revealed)}"
                 class="card glass-card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="alert alert-warning border-0">
                        <i class="bi bi-shield-lock me-2"></i>
                        Enter your master password to reveal sensitive information.
                    </div>
                    <form th:action="@{/vault/view/{id}/reveal(id=${entry.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="masterPassword" class="form-control glass-input" required
                                   placeholder="Master password" />
                            <button type="submit" class="btn btn-primary fw-semibold">
                                <i class="bi bi-unlock me-1"></i>Reveal
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card glass-card border-0 shadow-sm">
                <div class="card-header bg-transparent border-0 pt-3 d-flex justify-content-between">
                    <h5 class="fw-bold mb-0" th:text="${entry.accountName}">Account</h5>
                    <span class="badge rounded-pill bg-secondary" th:text="${entry.category}"></span>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="text-muted small fw-medium">Website</label>
                            <p class="mb-0" th:text="${entry.websiteUrl != null ? entry.websiteUrl : 'Not set'}">
                            </p>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-medium">Username / Email</label>
                            <div class="d-flex align-items-center gap-2">
                                <p class="mb-0" id="usernameVal"
                                   th:text="${entry.usernameOrEmail != null ? entry.usernameOrEmail : 'Not set'}">
                                </p>
                                <button class="btn btn-sm btn-outline-secondary" onclick="copyText('usernameVal')"
                                        th:if="${entry.usernameOrEmail != null}">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="text-muted small fw-medium">Password</label>
                            <div th:if="${revealed != null and revealed}" class="d-flex align-items-center gap-2">
                                <div class="input-group">
                                    <input type="password" id="pwdField" class="form-control glass-input"
                                           th:value="${decryptedPassword}" readonly />
                                    <button class="btn btn-outline-secondary" type="button"
                                            onclick="togglePwdField()">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </button>
                                    <button class="btn btn-outline-primary" type="button" onclick="copyPwd()">
                                        <i class="bi bi-clipboard"></i>
                                    </button>
                                </div>
                            </div>
                            <div th:if="${revealed == null or !revealed}">
                                <p class="mb-0 text-muted fst-italic">
                                    &#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;
                                </p>
                                <small class="text-muted">Enter master password above to reveal</small>
                            </div>
                        </div>
                        <div th:if="${revealed != null and revealed and decryptedNotes != null}" class="col-md-12">
                            <label class="text-muted small fw-medium">Notes</label>
                            <p class="mb-0" th:text="${decryptedNotes}"></p>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-medium">Added</label>
                            <p class="mb-0 small"
                               th:text="${#temporals.format(entry.createdAt, 'MMM dd, yyyy HH:mm')}"></p>
                        </div>
                        <div class="col-md-6" th:if="${entry.updatedAt != null}">
                            <label class="text-muted small fw-medium">Last Modified</label>
                            <p class="mb-0 small"
                               th:text="${#temporals.format(entry.updatedAt, 'MMM dd, yyyy HH:mm')}"></p>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-flex gap-2 mt-4 pt-3 border-top flex-wrap">
                        <a th:href="@{/vault/edit/{id}(id=${entry.id})}" class="btn btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <form th:action="@{/vault/toggle-favorite/{id}(id=${entry.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn"
                                    th:class="${entry.favorite} ? 'btn btn-warning' : 'btn btn-outline-warning'">
                                <i class="bi bi-star-fill me-1"></i>
                                <span th:text="${entry.favorite} ? 'Remove Favorite' : 'Add Favorite'"></span>
                            </button>
                        </form>

                        <!-- DELETE BUTTON -->
                        <button type="button" class="btn btn-outline-danger ms-auto" onclick="confirmDelete()">
                            <i class="bi bi-trash me-1"></i>Delete
                        </button>
                        <form th:action="@{/vault/delete/{id}(id=${entry.id})}" method="post" id="deleteForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0">
                <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Delete Entry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this password entry? <strong>This cannot be undone.</strong>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger"
                        onclick="document.getElementById('deleteForm').submit()">
                    <i class="bi bi-trash me-1"></i>Yes, Delete
                </button>
            </div>
        </div>
    </div>
</div>

<div id="copyToast" class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
    <div class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-check-circle me-2"></i>Copied to clipboard!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmDelete() {
        const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
        modal.show();
    }
    function togglePwdField() {
        const f = document.getElementById('pwdField');
        const i = document.getElementById('eyeIcon');
        f.type = f.type === 'password' ? 'text' : 'password';
        i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
    function copyPwd() {
        const f = document.getElementById('pwdField');
        navigator.clipboard.writeText(f.value).then(() => showToast());
    }
    function copyText(id) {
        const t = document.getElementById(id).textContent;
        navigator.clipboard.writeText(t).then(() => showToast());
    }
    function showToast() {
        const t = new bootstrap.Toast(document.querySelector('#copyToast .toast'));
        t.show();
        setTimeout(() => { try { navigator.clipboard.writeText(''); } catch (e) { } }, 30000);
    }
</script>
</body>

</html>
