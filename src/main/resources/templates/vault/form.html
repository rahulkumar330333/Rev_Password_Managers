<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Password Entry')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/vault}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h3 class="fw-bold mb-0">
                    <i class="bi bi-key me-2 text-primary"></i>
                    <span th:text="${editing} ? 'Edit Password Entry' : 'Add New Password'"></span>
                </h3>
            </div>

            <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span></div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${editing} ? '/vault/edit/' + ${entryId} : '/vault/add'" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input th:if="${editing}" type="hidden" name="id" th:value="${entryDto.id}"/>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Account Name <span class="text-danger">*</span></label>
                                <input type="text" name="accountName" class="form-control" required
                                       th:value="${entryDto.accountName}" placeholder="e.g. Gmail, Facebook"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Website URL</label>
                                <input type="url" name="websiteUrl" class="form-control"
                                       th:value="${entryDto.websiteUrl}" placeholder="https://example.com"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Username / Email</label>
                                <input type="text" name="usernameOrEmail" class="form-control"
                                       th:value="${entryDto.usernameOrEmail}" placeholder="your@email.com"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Category</label>
                                <select name="category" class="form-select">
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                                            th:selected="${entryDto.category == cat}"></option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-medium">Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" name="password" id="entryPwd" class="form-control" required
                                           th:value="${entryDto.password}" placeholder="Enter or generate a strong password"
                                           oninput="checkStrength(this.value)"/>
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('entryPwd',this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" onclick="generateAndFill()">
                                        <i class="bi bi-shuffle me-1"></i>Generate
                                    </button>
                                </div>
                                <div class="mt-1">
                                    <div class="progress" style="height:5px">
                                        <div id="strengthBar" class="progress-bar" style="width:0%"></div>
                                    </div>
                                    <small id="strengthLabel" class="text-muted"></small>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-medium">Notes</label>
                                <textarea name="notes" class="form-control" rows="3"
                                          th:text="${entryDto.notes}" placeholder="Optional notes (will be encrypted)"></textarea>
                            </div>
                            <div class="col-md-12">
                                <div class="form-check">
                                    <input type="checkbox" name="favorite" class="form-check-input" id="favoriteCheck"
                                           th:checked="${entryDto.favorite}"/>
                                    <label class="form-check-label" for="favoriteCheck">
                                        <i class="bi bi-star-fill text-warning me-1"></i>Mark as Favorite
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Master Password Verification -->
                        <div class="alert alert-info border-0 rounded-3 mb-3">
                            <i class="bi bi-info-circle me-2"></i>
                            <strong>Security Requirement:</strong> Enter your master password to encrypt and save this entry.
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Master Password <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" name="masterPassword" id="masterPwd" class="form-control" required
                                       placeholder="Enter your master password to save"/>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('masterPwd',this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary fw-semibold px-4">
                                <i class="bi bi-save me-2"></i><span th:text="${editing} ? 'Update Entry' : 'Save Entry'"></span>
                            </button>
                            <a th:href="@{/vault}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
    function generateAndFill() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%^&*';
        let pwd = '';
        for (let i = 0; i < 16; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
        const input = document.getElementById('entryPwd');
        input.type = 'text';
        input.value = pwd;
        checkStrength(pwd);
    }
    function checkStrength(pwd) {
        let score = 0;
        if (pwd.length >= 8) score++;
        if (pwd.length >= 12) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[a-z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        const bar = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        const pct = (score / 6) * 100;
        bar.style.width = pct + '%';
        if (score <= 2) { bar.className = 'progress-bar bg-danger'; label.textContent = 'Weak'; label.className = 'text-danger small'; }
        else if (score <= 4) { bar.className = 'progress-bar bg-warning'; label.textContent = 'Medium'; label.className = 'text-warning small'; }
        else { bar.className = 'progress-bar bg-success'; label.textContent = score >= 6 ? 'Very Strong' : 'Strong'; label.className = 'text-success small'; }
    }
</script>
</body>
</html>
