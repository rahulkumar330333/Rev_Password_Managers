<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Change Password')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/profile}" class="btn btn-outline-secondary btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
                <h3 class="fw-bold mb-0"><i class="bi bi-lock-fill me-2 text-primary"></i>Change Master Password</h3>
            </div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="alert alert-warning border-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>Important:</strong> Changing your master password will require re-entering it when accessing stored passwords.
                    </div>
                    <form th:action="@{/profile/change-password}" method="post" th:object="${dto}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Current Password</label>
                            <div class="input-group">
                                <input type="password" th:field="*{currentPassword}" id="currentPwd" class="form-control" required/>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('currentPwd',this)"><i class="bi bi-eye"></i></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium">New Password</label>
                            <div class="input-group">
                                <input type="password" th:field="*{newPassword}" id="newPwd" class="form-control" required minlength="8"
                                       oninput="checkStrength(this.value)"/>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('newPwd',this)"><i class="bi bi-eye"></i></button>
                            </div>
                            <div class="progress mt-1" style="height:5px"><div id="bar" class="progress-bar" style="width:0%"></div></div>
                            <small id="strengthLabel" class="text-muted"></small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium">Confirm New Password</label>
                            <div class="input-group">
                                <input type="password" th:field="*{confirmNewPassword}" id="confirmPwd" class="form-control" required/>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('confirmPwd',this)"><i class="bi bi-eye"></i></button>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-semibold">
                                <i class="bi bi-lock me-2"></i>Change Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(id, btn) {
        const i = document.getElementById(id);
        i.type = i.type === 'password' ? 'text' : 'password';
        btn.querySelector('i').className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
    function checkStrength(pwd) {
        let s = 0;
        if (pwd.length >= 8) s++; if (pwd.length >= 12) s++;
        if (/[A-Z]/.test(pwd)) s++; if (/[a-z]/.test(pwd)) s++;
        if (/[0-9]/.test(pwd)) s++; if (/[^A-Za-z0-9]/.test(pwd)) s++;
        const bar = document.getElementById('bar'), label = document.getElementById('strengthLabel');
        bar.style.width = (s/6*100)+'%';
        if (s<=2){bar.className='progress-bar bg-danger';label.textContent='Weak';label.className='text-danger small';}
        else if(s<=4){bar.className='progress-bar bg-warning';label.textContent='Medium';label.className='text-warning small';}
        else{bar.className='progress-bar bg-success';label.textContent='Strong';label.className='text-success small';}
    }
</script>
</body>
</html>
