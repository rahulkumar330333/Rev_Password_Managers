# ==============================
# Application
# ==============================
spring.application.name=password-manager
server.port=8086

# ==============================
# Oracle Database Configuration
# ==============================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/freepdb1
spring.datasource.username=password_manager
spring.datasource.password=Aryanrahu1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection pool tuning (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ==============================
# JPA / Hibernate - Oracle
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.open-in-view=false

# ==============================
# Thymeleaf
# ==============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==============================
# Session
# ==============================
server.servlet.session.timeout=30m

# ==============================
# Encryption
# ==============================
app.encryption.secret=SecurePassManager2024Key!

# ==============================
# Logging
# ==============================
logging.level.com.passmanager=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ==============================
# Error details
# ==============================
server.error.include-stacktrace=on_param
server.error.include-message=always

