# ==============================
# Test profile - uses H2 in-memory database
# Oracle is NOT used for unit tests
# ==============================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Use H2 dialect for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Jasypt for tests
jasypt.encryptor.enabled=false

# Disable mail for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# App encryption key for tests
app.encryption.secret=SecurePassManager2024Key!

# Logging
logging.level.com.passmanager=WARN